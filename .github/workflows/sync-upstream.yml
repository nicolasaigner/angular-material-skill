# .github/workflows/sync-upstream.yml
name: sync-upstream

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday, 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check upstream release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/check-release.mjs

      - name: Regenerate if behind
        if: steps.check.outputs.behind == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          case "$TAG" in
            *[!0-9.v-]*) echo "invalid tag (disallowed character): $TAG"; exit 1 ;;
          esac
          case "$TAG" in
            [0-9]*.[0-9]*.[0-9]* | v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "invalid tag (expected semver, e.g. 21.0.2): $TAG"; exit 1 ;;
          esac
          node tools/discover-sources.mjs --to "$TAG"
          node tools/sync.mjs "$TAG"
          node tools/gen-index.mjs

      - name: Open Pull Request
        if: steps.check.outputs.behind == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.latest }}
        run: |
          case "$TAG" in
            *[!0-9.v-]*) echo "invalid tag (disallowed character): $TAG"; exit 1 ;;
          esac
          case "$TAG" in
            [0-9]*.[0-9]*.[0-9]* | v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "invalid tag (expected semver, e.g. 21.0.2): $TAG"; exit 1 ;;
          esac
          BRANCH="chore/sync-$TAG"
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "branch $BRANCH already exists — PR presumed open, nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing changed despite behind=true — nothing to commit."
            exit 0
          fi
          git commit -m "chore: sync angular/components $TAG"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore: sync angular/components $TAG" \
            --body "Automatic update generated by the **sync-upstream** workflow. Review the diff of \`references/\` and \`tools/lib/sources.generated.json\` (new/orphaned components) before merging."
